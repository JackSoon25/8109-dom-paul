<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
        <h1 class="display-4">Nowhere Amusement Park Booking System</h1>
        <div class="m-1">
            <label>Ticket Type</label>
            <input type="radio" name="ticket-type" class="ticket-type" value="priority" checked/>
            <label>Priority</label>

            <input type="radio" name="ticket-type" class="ticket-type" value="nonPriority"/>
            <label>Non-Priority</label>
        </div>

        <div class="m-1">
            <label>Date</label>
            <input type="date" name="date" class="form-control" id="date"/>
            <div class="invalid-feedback d-block" id="date-error"></div>
        </div>

        <div class="m-1">
            <label>Name</label>
            <input type="text" class="form-control" id="name"/>
            <div class="invalid-feedback d-block" id="name-error"></div>
        </div>

        <div class="m-1">
            <label>Adult tickets pax:</label>
            <input type="number" class="form-control" id="adult-tickets" value="0"/>
             <div class="invalid-feedback d-block" id="adult-ticket-error"></div>
        </div>

        <div class="m-1">
            <label>Children tickets pax:</label>
            <input type="number" class="form-control" id="children-tickets" value="0"/>
             <div class="invalid-feedback d-block" id="children-ticket-error"></div>
        </div>

        <button class="btn btn-primary m-1" id="submit-btn">Submit</button>

        <div id="total" class="alert alert-success d-none">
        
    </div>

    </div>
   



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
